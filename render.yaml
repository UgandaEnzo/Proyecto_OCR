services:
  - type: web
    name: conciliacion-pagos
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: MOTOR_OCR_ACTIVO
        value: rapidocr
